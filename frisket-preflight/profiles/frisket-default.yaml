# Frisket Default — Venue Poster / Handbill / Signage
# Validates against: schemas/profile.schema.json
schema_version: 1
name: "Frisket Default"
description: >
  Default prepress profile for Frisket print jobs. Tuned for venue posters,
  handbills, and signage. Fixups are listed for Phase 3; the engine must not
  apply them without explicit confirmation.
job_types:
  - "Venue Poster"
  - "Handbill"
  - "Signage"

checks:
  - id: embedded-fonts
    severity: error

  - id: image-resolution
    min_dpi: 300
    severity: warning

  - id: bleed
    required: true
    amount_pt: 9
    severity: error

  - id: trim
    severity: warning
    tolerance_pt: 1

  - id: page-size
    severity: warning
    tolerance_pt: 1

  - id: color-mode
    allowed: [CMYK, Grayscale]
    severity: error

fixups:
  - id: rgb-to-cmyk
    confirm: true

  - id: add-bleed
    amount_pt: 9
    confirm: true

  - id: downsample-images
    target_dpi: 300
    confirm: true
